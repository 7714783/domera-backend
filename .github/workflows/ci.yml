name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (typecheck + prisma)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Prisma validate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
        run: npx prisma validate
      - name: Prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
        run: npx prisma generate
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Syntax-check RLS SQL
        run: |
          for f in prisma/rls/*.sql; do
            awk '/create policy|alter policy/ { if ($0 !~ /on /) { print "missing ON in: " $0; exit 1 } }' "$f"
          done
      - name: Guard against RLS GUC name drift (INIT-008 Phase 1)
        # Every RLS policy MUST use app.current_tenant_id — that's what the
        # Prisma extension sets via set_config. An older generation of
        # migrations used app.tenant_id and silently evaluated to NULL →
        # default-deny. This guard fails the build if anyone reintroduces
        # the wrong name in raw-SQL migrations or rls/*.sql files. Inline
        # comments documenting the old name are excluded.
        run: |
          bad=$(grep -rnE "current_setting\('app\.tenant_id'" prisma/ | grep -v '^--' || true)
          if [ -n "$bad" ]; then
            echo "RLS GUC name drift — use app.current_tenant_id, not app.tenant_id:"
            echo "$bad"
            exit 1
          fi
      - name: Authz policy engine unit tests (INIT-007 Phase 3)
        # Pure-TS unit tests for apps/api/src/common/authz — no DB, no
        # network. 19 assertions cover every scope dimension + MFA step-up.
        # Test imports compiled JS from ../dist so we tsc-build first.
        run: |
          npx tsc
          node test/authz-policy.test.mjs
        env:
          NODE_OPTIONS: --no-warnings

  migrations-apply:
    name: Apply migrations on a clean Postgres (end-to-end)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: domera_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: npx prisma migrate deploy
      - name: Raw-SQL migrations
        env:
          DATABASE_URL_MIGRATOR: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: node prisma/migrations-sql/apply-migrations.mjs
      - name: migrate status must be clean
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: |
          out="$(npx prisma migrate status 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -q "Database schema is up to date" || { echo "drift"; exit 1; }

  rls-smoke:
    name: RLS + tenant-header breach probe (INIT-005 P1.4b)
    runs-on: ubuntu-latest
    needs: migrations-apply
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: domera_rls
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domera_rls
      DATABASE_URL_MIGRATOR: postgresql://postgres:postgres@localhost:5432/domera_rls
      # Password matches the default in 002_split_roles.sql when no
      # app.app_password GUC is set — keeps the apply step credential-free.
      DATABASE_URL_APP: postgresql://domera_app:domera_app@localhost:5432/domera_rls
      JWT_SECRET: ci-rls-secret-not-for-prod
      PORT: '4000'
      API_BASE: http://127.0.0.1:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Apply raw-SQL migrations
        run: node prisma/migrations-sql/apply-migrations.mjs

      - name: Apply RLS bundle in order (enable → split roles → force → public RPC)
        # 002_split_roles.sql reads optional GUCs app.migrator_password +
        # app.app_password via current_setting(...,true) and falls back to
        # 'domera_migrator' / 'domera_app' literal passwords. We want the
        # fallback (DATABASE_URL_APP above uses 'domera_app' as the password)
        # so no extra plumbing needed. Files passed explicitly so the script
        # doesn't default to running only 001.
        run: |
          node prisma/rls/apply-rls.mjs \
            001_enable_rls.sql \
            002_split_roles.sql \
            003_force_rls.sql \
            004_public_qr_rpc.sql

      - name: Seed reference tables (roles + permissions + document types)
        # /v1/auth/register + /v1/onboarding/bootstrap rely on the Role
        # reference rows (workspace_owner, building_manager, etc.). In PROD
        # these are seeded once during deploy; in CI the fresh DB is empty
        # so bootstrap fails with "role not found". Run the seed here.
        run: node prisma/seeds/seed-reference.mjs

      - name: Re-grant tables to domera_migrator/domera_app (now that roles exist)
        # 007 + 008 wrap GRANTs in role-existence checks; on the first apply
        # the roles didn't exist so the GRANTs were skipped. apply-migrations
        # tracks each file as applied so it won't re-run them. Replay just
        # the GRANT blocks here as plain SQL so domera_app + domera_migrator
        # can read what the RLS bundle now expects them to.
        run: |
          node -e "
          const { PrismaClient } = require('@prisma/client');
          const p = new PrismaClient({ datasources: { db: { url: process.env.DATABASE_URL_MIGRATOR } } });
          (async () => {
            // Grants from 007 (public-QR SECURITY DEFINER path)
            for (const t of ['qr_locations','buildings','building_floors','building_units','service_requests']) {
              await p.\$executeRawUnsafe('GRANT ALL ON TABLE ' + t + ' TO domera_migrator');
            }
            // Grants from 008 (task_notes)
            await p.\$executeRawUnsafe('GRANT ALL ON TABLE \"task_notes\" TO domera_migrator');
            await p.\$executeRawUnsafe('GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE \"task_notes\" TO domera_app');
            console.log('grants OK');
            await p.\$disconnect();
          })().catch(e => { console.error(e.message); process.exit(1); });
          "

      - name: Build TypeScript
        run: npx nest build

      - name: Boot API in background
        run: |
          node dist/main.js > api.log 2>&1 &
          echo $! > api.pid
          # Poll /v1/health for up to 30s.
          for i in $(seq 1 30); do
            if curl -sf $API_BASE/v1/health > /dev/null; then echo "API up after ${i}s"; exit 0; fi
            sleep 1
          done
          echo "--- api.log ---"; tail -200 api.log
          exit 1

      - name: Run RLS isolation smoke
        run: node test/rls-isolation-smoke.mjs

      - name: Tail API log on success
        if: success()
        run: tail -50 api.log || true

      - name: Tail API log on failure
        if: failure()
        run: tail -200 api.log || true

      - name: Stop API
        if: always()
        run: kill "$(cat api.pid)" || true

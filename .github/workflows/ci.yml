name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.11.0'

jobs:
  install:
    name: Install & cache deps
    runs-on: ubuntu-latest
    outputs:
      store-path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile

  typecheck:
    name: Typecheck (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        app: [api, frontend, mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate (api only)
        if: matrix.app == 'api'
        run: pnpm --filter @domera/api exec prisma generate
      - run: pnpm --filter @domera/${{ matrix.app }} typecheck

  lint:
    name: Lint (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        app: [api, frontend, mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @domera/${{ matrix.app }} lint

  unit-tests:
    name: Unit tests (api)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # node:test + --experimental-strip-types (Node 22+) — no Jest dependency.
      # Pure-logic tests: helpers, occupant filters, ppm-setup rules, cleaning
      # request transitions. New test files matching test/*.test.mjs are picked
      # up automatically by the glob in apps/api/package.json.
      - run: pnpm --filter @domera/api test

  e2e:
    name: E2E (Playwright / chromium)
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install chromium only (skip WebKit/Firefox to save minutes)
        run: pnpm --filter @domera/frontend exec playwright install --with-deps chromium
      # playwright.config.ts boots `next dev` via webServer{} — no manual
      # api required for public-facing tests (they hit client-rendered markup).
      - name: Run Playwright
        env:
          CI: '1'
        run: pnpm --filter @domera/frontend e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          retention-days: 7

  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests, e2e]
    strategy:
      fail-fast: false
      matrix:
        app: [api, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate (api only)
        if: matrix.app == 'api'
        run: pnpm --filter @domera/api exec prisma generate
      - run: pnpm --filter @domera/${{ matrix.app }} build

  prisma-validate:
    name: Prisma schema + RLS SQL validate
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @domera/api exec prisma validate
      - name: Syntax-check RLS SQL
        run: |
          for f in apps/api/prisma/rls/*.sql; do
            echo "→ $f"
            # trivial sanity: every CREATE/ALTER POLICY line has a matching ON <table>
            awk '/create policy|alter policy/ { if ($0 !~ /on /) { print "missing ON in: " $0; exit 1 } }' "$f"
          done
      - name: Fail if `prisma db push` leaks into scripts
        run: |
          # Explicit allowlist: the only script allowed to reference db push is the
          # sandbox-only escape hatch `db:push:sandbox`. Everything else is a regression.
          if grep -RIn --include='package.json' --exclude-dir=node_modules --exclude-dir=gh 'prisma db push' . \
              | grep -v '"db:push:sandbox"'; then
            echo "Unexpected reference to 'prisma db push'. Use prisma migrate deploy. See docs/architecture/database-migrations.md."
            exit 1
          fi
      - name: Raw-SQL migrations — filenames well-formed
        run: |
          # Filenames must match NNN_name.sql so the lexical-order runner stays deterministic.
          for f in apps/api/prisma/migrations-sql/*.sql; do
            base="$(basename "$f")"
            if ! echo "$base" | grep -Eq '^[0-9]{3}_[a-z0-9_]+\.sql$'; then
              echo "Bad raw-SQL migration filename: $base (expected NNN_lower_snake.sql)"
              exit 1
            fi
          done
      - name: RLS GUC name guard — only `app.current_tenant_id` is allowed
        run: |
          # The runtime PrismaService sets `app.current_tenant_id`; using the
          # legacy `app.tenant_id` GUC name silently default-denies (the
          # original 002/003 bug fixed by migration 011 / INIT-008 Phase 1).
          # This guard prevents the wrong name from re-entering any new SQL.
          BAD=$(grep -rnE "current_setting\\('app\\.tenant_id'" \
            apps/api/prisma/migrations-sql/ \
            apps/api/prisma/rls/ 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "::error::Wrong RLS GUC name detected — use app.current_tenant_id, not app.tenant_id"
            echo "$BAD"
            exit 1
          fi
          echo "✓ no app.tenant_id occurrences in SQL"

  format:
    name: Prettier format check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Strict: the codebase is Prettier-normalised. Run `pnpm run format`
      # locally to fix drift before committing.
      - run: pnpm run format:check

  i18n:
    name: i18n structure check (en / ru / he)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Hard fail: every namespace must have the same key tree across en/ru/he.
      - run: pnpm run i18n:check
      # Warn-only: grep for common hardcoded-UI-string anti-patterns.
      - run: pnpm run i18n:audit || true

  migrations-apply:
    name: Apply migrations on a clean Postgres (end-to-end)
    runs-on: ubuntu-latest
    needs: install
    # Spin up the same Postgres major version used in prod. Uses a throwaway
    # database so `prisma migrate deploy` + raw-SQL + RLS run on a known-empty
    # state. If migrations are broken (syntax error, missing dependency, out-of-
    # order file), this job fails — blocking merge before it reaches prod.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: domera_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Provision split RLS roles
        env:
          DATABASE_URL_SUPER: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: pnpm --filter @domera/api db:rls
      - name: Apply Prisma migrations (migrate deploy)
        env:
          # Superuser for CI — in prod this would be DATABASE_URL_MIGRATOR (BYPASSRLS).
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: pnpm --filter @domera/api db:migrate:deploy
      - name: Apply raw-SQL migrations
        env:
          DATABASE_URL_MIGRATOR: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: pnpm --filter @domera/api db:migrate:sql
      - name: migrate status must be clean
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: |
          out="$(pnpm --silent --filter @domera/api exec prisma migrate status 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -q "Database schema is up to date" || { echo "migrations drifted"; exit 1; }
      - name: Seed demo building (idempotent)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: pnpm --filter @domera/api seed
      - name: RLS cross-tenant isolation (live DB)
        # Proves the app role cannot see another tenant's rows after
        # SET app.tenant_id. apply-rls.mjs provisioned the split roles
        # earlier in this job.
        env:
          DATABASE_URL_SUPER: postgresql://postgres:postgres@localhost:5432/domera_ci
          DATABASE_URL: postgresql://domera_app:domera_app@localhost:5432/domera_ci
        run: pnpm --filter @domera/api test:rls

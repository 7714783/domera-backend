name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (typecheck + prisma)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Prisma validate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
        run: npx prisma validate
      - name: Prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
        run: npx prisma generate
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Syntax-check RLS SQL
        run: |
          for f in prisma/rls/*.sql; do
            awk '/create policy|alter policy/ { if ($0 !~ /on /) { print "missing ON in: " $0; exit 1 } }' "$f"
          done

  migrations-apply:
    name: Apply migrations on a clean Postgres (end-to-end)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: domera_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: npx prisma migrate deploy
      - name: Raw-SQL migrations
        env:
          DATABASE_URL_MIGRATOR: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: node prisma/migrations-sql/apply-migrations.mjs
      - name: migrate status must be clean
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domera_ci
        run: |
          out="$(npx prisma migrate status 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -q "Database schema is up to date" || { echo "drift"; exit 1; }
